name: Data Platform Closure CI
on:
  pull_request:
    branches: [main]
    paths:
      - "docs/platform/data/DATA-PLATFORM-*.md"
      - "docs/platform/data/HANDOFF-DATA-TO-*.md"
      - "docs/platform/data/DP-7-HANDOFF.md"
      - "docs/platform/governance/**"
      - "verification/data-platform-closure/**"
      - "verification/dp7/run_dp7_allocation_verification.py"
      - "verification/sc-dp1-baseline-reconciliation/run_sc_baseline_reconciliation.py"
      - ".github/workflows/data-platform-closure-ci.yml"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: data-platform-closure-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  closure:
    name: Closure documents / evidence / protected diff
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python verification/data-platform-closure/run_data_platform_closure_verification.py
      - run: python verification/dp7/run_dp7_allocation_verification.py
      - run: python verification/sc-dp1-baseline-reconciliation/run_sc_baseline_reconciliation.py
