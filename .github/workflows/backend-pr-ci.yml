name: Backend PR CI
on:
  pull_request:
    paths:
      - "jc-backend/**"
      - "jc-recommendation-core/**"
      - "jc-data-contracts/**"
      - "database/journey-connect-db-v2.1/**"
      - "database/journey-connect-db-v2.7/**"
      - "jc-search-*/**"
      - "docs/platform/intelligence/**"
      - "docs/platform/data/DP-4-*.md"
      - "docs/platform/data/DP-5-*.md"
      - "docs/platform/data/DATA-PLATFORM-*.md"
      - "docs/platform/data/HANDOFF-DATA-TO-*.md"
      - "verification/ip12-5/**"
      - "verification/dp4/**"
      - "verification/dp5/**"
      - "verification/data-platform-closure/**"
      - ".github/workflows/backend-pr-ci.yml"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: backend-pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  canonical-postgres-tests:
    name: Java / canonical PostgreSQL 15
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: jc-backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
      - run: chmod +x ./gradlew
      - name: Run full protected readiness gate
        run: |
          ./gradlew verifyIp125 --stacktrace --no-daemon
          python ../verification/dp5/run_dp5_static_verification.py
          python ../verification/data-platform-closure/run_data_platform_closure_verification.py
