name: Backend PR CI

on:
  pull_request:
    paths:
      - "jc-backend/**"
      - "jc-recommendation-core/**"
      - "jc-data-contracts/**"
      - "database/journey-connect-db-v2.1/**"
      - "database/journey-connect-db-v2.7/**"
      - "jc-search-*/**"
      - "docs/platform/intelligence/**"
      - "docs/platform/data/DP-4-*.md"
      - "verification/ip12-5/**"
      - "verification/dp4/**"
      - ".github/workflows/backend-pr-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  canonical-postgres-tests:
    name: Java / canonical PostgreSQL 15
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: jc-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Run IP-12.5 full protected readiness gate
        shell: bash
        run: |
          set -o pipefail
          ./gradlew verifyIp125 --stacktrace --no-daemon 2>&1 | tee ../verification/ip12-5/IP125_BACKEND_CI.log
          python ../verification/dp4/run_dp4_static_verification.py

      - name: Upload IP-12.5 backend CI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ip125-backend-ci-evidence
          path: |
            verification/ip12-5/IP125_BACKEND_CI.log
            jc-backend/build/test-results/**/*.xml
            jc-backend/build/reports/tests/**
          if-no-files-found: warn
