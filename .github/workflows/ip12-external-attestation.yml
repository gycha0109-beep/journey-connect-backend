name: IP-12 External Attestation Harness

on:
  pull_request:
    branches:
      - attestation/ip12-1-runner-base

permissions:
  contents: read

concurrency:
  group: ip12-external-attestation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  external-attestation:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    services:
      postgres:
        image: postgres:15-bookworm
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout exact PR source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Record source identity and package exact checkout
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p attestation-logs
          {
            echo "HEAD=$(git rev-parse HEAD)"
            echo "BRANCH=$(git branch --show-current)"
            git status --short
            git diff --stat "${{ github.event.pull_request.base.sha }}..HEAD"
          } | tee attestation-logs/00-source-identity.log
          tar \
            --exclude=.git \
            --exclude='*/build' \
            --exclude='*/.gradle' \
            -czf /tmp/ip12-exact-source.tar.gz .
          sha256sum /tmp/ip12-exact-source.tar.gz | tee attestation-logs/00-source-snapshot.sha256

      - name: Run Gradle external attestation matrix
        working-directory: jc-backend
        shell: bash
        env:
          JC_TEST_POSTGRES_IMAGE: postgres:15-bookworm
        run: |
          set -uo pipefail
          LOG_DIR=../attestation-logs
          mkdir -p "$LOG_DIR"

          run_step() {
            local name="$1"
            shift
            echo "===== $name =====" | tee "$LOG_DIR/${name}.command"
            printf '%q ' "$@" >> "$LOG_DIR/${name}.command"
            printf '\n' >> "$LOG_DIR/${name}.command"
            "$@" > "$LOG_DIR/${name}.log" 2>&1
            local ec=$?
            echo "$ec" > "$LOG_DIR/${name}.exit"
            echo "$name exit=$ec"
            return 0
          }

          chmod +x ./gradlew
          run_step 01-gradle-version ./gradlew --version
          run_step 02-clean-test ./gradlew --no-daemon --stacktrace clean test
          run_step 03-check ./gradlew --no-daemon --stacktrace check
          run_step 04-ip9 ./gradlew --no-daemon --stacktrace ip9ControlledBackendHookRegression
          run_step 05-ip10 ./gradlew --no-daemon --stacktrace ip10CombinedExternalRegressionClosure
          run_step 06-ip115 ./gradlew --no-daemon --stacktrace ip115CombinedExternalAttestation
          run_step 07-ip12 ./gradlew --no-daemon --stacktrace verifyIp12
          run_step 08-p0-p1-p2 ./gradlew --no-daemon --stacktrace p0Verification p1Verification p2Verification
          run_step 09-spring-profiles ./gradlew --no-daemon --stacktrace test --tests 'com.jc.backend.search.shadow.SearchShadowBackendConfigurationTest' --tests 'com.jc.backend.search.shadow.stage.*' --tests 'com.jc.backend.search.shadow.production.ProductionSearchShadowConfigurationTest'
          run_step 10-mvc-explore ./gradlew --no-daemon --stacktrace test --tests 'com.jc.backend.post.PostControllerSearchShadowHookTest'
          run_step 11-micrometer ./gradlew --no-daemon --stacktrace test --tests 'com.jc.backend.search.shadow.production.MicrometerSearchShadowMetricSinkTest'
          run_step 12-kill-switch ./gradlew --no-daemon --stacktrace test --tests 'com.jc.backend.search.shadow.production.ProductionSearchShadowDisableDrillTest'
          run_step 13-sampling ./gradlew --no-daemon --stacktrace test --tests 'com.jc.backend.search.shadow.production.ProductionSearchShadowSamplingGateTest' --tests 'com.jc.backend.search.shadow.production.ProductionSearchShadowPropertiesTest'

      - name: Run PostgreSQL 15 SQL 01..28 fresh replay
        shell: bash
        env:
          PGPASSWORD: postgres
        run: |
          set +e
          LOG=attestation-logs/14-postgres-sql-01-28.log
          EXIT=attestation-logs/14-postgres-sql-01-28.exit
          : > "$LOG"
          dropdb -h 127.0.0.1 -p 5432 -U postgres --if-exists jc_ip12_attestation >> "$LOG" 2>&1
          createdb -h 127.0.0.1 -p 5432 -U postgres jc_ip12_attestation >> "$LOG" 2>&1
          ec=$?
          if [ "$ec" -eq 0 ]; then
            for file in $(find database/journey-connect-db-v2.7 -maxdepth 1 -type f -name '[0-9][0-9]_*.sql' | sort); do
              echo "===== $file =====" >> "$LOG"
              psql -h 127.0.0.1 -p 5432 -U postgres -d jc_ip12_attestation -v ON_ERROR_STOP=1 -f "$file" >> "$LOG" 2>&1
              ec=$?
              if [ "$ec" -ne 0 ]; then
                break
              fi
            done
          fi
          echo "$ec" > "$EXIT"
          psql -h 127.0.0.1 -p 5432 -U postgres -d jc_ip12_attestation -Atc "select version();" >> "$LOG" 2>&1
          exit 0

      - name: Record protected source and SQL manifests
        shell: bash
        run: |
          set +e
          {
            echo '== SQL 01..28 =='
            find database/journey-connect-db-v2.7 -maxdepth 1 -type f -name '[0-9][0-9]_*.sql' -print0 | sort -z | xargs -0 sha256sum
            echo '== IP-12 protected conditions =='
            grep -RInE 'production shadow|sampling|Search cutover|DISABLED|0 BPS|NO_GO_FOR_TRAFFIC' docs/platform/intelligence/IP-12-*.md | head -200
          } > attestation-logs/15-protected-manifest.log 2>&1
          echo "$?" > attestation-logs/15-protected-manifest.exit

      - name: Package Gradle offline dependency cache
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "$HOME/.gradle/caches/modules-2" ]; then
            tar -C "$HOME/.gradle/caches" -czf /tmp/gradle-modules-2.tar.gz modules-2
            sha256sum /tmp/gradle-modules-2.tar.gz | tee attestation-logs/16-gradle-modules-2.sha256
            du -h /tmp/gradle-modules-2.tar.gz | tee attestation-logs/16-gradle-modules-2.size
          else
            echo 'modules-2 cache missing' | tee attestation-logs/16-gradle-modules-2.missing
            tar -czf /tmp/gradle-modules-2.tar.gz --files-from /dev/null
          fi

      - name: Summarize exit codes
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          logs = Path('attestation-logs')
          rows = []
          for path in sorted(logs.glob('*.exit')):
              try:
                  value = int(path.read_text().strip())
              except Exception:
                  value = 999
              rows.append((path.stem, value))
          with (logs / 'IP12_ATTESTATION_EXIT_SUMMARY.tsv').open('w', encoding='utf-8', newline='\n') as out:
              out.write('check\texit_code\n')
              for name, value in rows:
                  out.write(f'{name}\t{value}\n')
          print('\n'.join(f'{name}: {value}' for name, value in rows))
          PY

      - name: Upload exact source snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ip12-exact-source
          path: /tmp/ip12-exact-source.tar.gz
          if-no-files-found: error
          compression-level: 0
          retention-days: 3

      - name: Upload Gradle offline cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ip12-gradle-modules-2
          path: /tmp/gradle-modules-2.tar.gz
          if-no-files-found: error
          compression-level: 0
          retention-days: 3

      - name: Upload attestation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ip12-attestation-logs
          path: attestation-logs
          if-no-files-found: error
          retention-days: 7

      - name: Enforce attestation result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          failed=0
          while IFS=$'\t' read -r name code; do
            [ "$name" = check ] && continue
            if [ "$code" != 0 ]; then
              echo "FAILED: $name exit=$code"
              failed=1
            fi
          done < attestation-logs/IP12_ATTESTATION_EXIT_SUMMARY.tsv
          exit "$failed"
