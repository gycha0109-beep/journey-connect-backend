name: Data PostgreSQL CI

on:
  pull_request:
    paths:
      - "database/journey-connect-db-v2.7/29_*.sql"
      - "database/journey-connect-db-v2.7/30_*.sql"
      - "database/journey-connect-db-v2.7/31_*.sql"
      - "database/journey-connect-db-v2.7/32_*.sql"
      - "database/journey-connect-db-v2.7/33_*.sql"
      - "database/journey-connect-db-v2.7/34_*.sql"
      - "database/journey-connect-db-v2.7/35_*.sql"
      - "database/journey-connect-db-v2.7/36_*.sql"
      - "database/journey-connect-db-v2.7/37_*.sql"
      - "database/journey-connect-db-v2.7/38_*.sql"
      - "database/journey-connect-db-v2.7/39_*.sql"
      - "database/journey-connect-db-v2.7/40_*.sql"
      - "database/journey-connect-db-v2.7/41_*.sql"
      - "database/journey-connect-db-v2.7/42_*.sql"
      - "database/journey-connect-db-v2.7/43_*.sql"
      - "database/journey-connect-db-v2.7/44_*.sql"
      - "database/journey-connect-db-v2.7/45_*.sql"
      - "database/journey-connect-db-v2.7/46_*.sql"
      - "database/journey-connect-db-v2.7/47_*.sql"
      - "verification/dp2/**"
      - "verification/dp3/**"
      - "verification/dp4-5/**"
      - "verification/dp5/**"
      - "verification/dp6/**"
      - "docs/platform/data/DP-2-*.md"
      - "docs/platform/data/DP-3-*.md"
      - "docs/platform/data/DP-4-5-*.md"
      - "docs/platform/data/DP-5-*.md"
      - "docs/platform/data/DP-6-*.md"
      - ".github/workflows/data-postgres-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: data-postgres-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  data-processing:
    name: PostgreSQL ${{ matrix.postgres }} / DP-2 through DP-6
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        postgres: ["15", "18"]
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}-alpine
        env:
          POSTGRES_DB: journey_connect
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d journey_connect"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/journey_connect
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client
      - name: Run DP-5 and DP-6 static verification
        run: |
          python verification/dp5/run_dp5_static_verification.py
          python verification/dp6/run_dp6_allocation_verification.py
          python verification/dp6/run_dp6_static_verification.py
      - name: Verify protected SQL 01..42 unchanged
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          protected_changes="$(git diff --name-only origin/main...HEAD -- database/journey-connect-db-v2.7 \
            | grep -E '/(0[1-9]|1[0-9]|2[0-9]|3[0-9]|4[0-2])_.*\.sql$' || true)"
          if [[ -n "$protected_changes" ]]; then
            printf 'Protected canonical SQL changed:\n%s\n' "$protected_changes" >&2
            exit 1
          fi
          changed_sql="$(git diff --name-only origin/main...HEAD -- database/journey-connect-db-v2.7 \
            | grep -E '\.sql$' | sort || true)"
          expected_sql="$(printf '%s\n' \
            database/journey-connect-db-v2.7/43_data_quality_validation_foundation.sql \
            database/journey-connect-db-v2.7/44_data_quality_metrics_and_verdict.sql \
            database/journey-connect-db-v2.7/45_data_quality_persistence_and_roles.sql \
            database/journey-connect-db-v2.7/46_data_quality_rebuild_and_safe_views.sql \
            database/journey-connect-db-v2.7/47_data_quality_validation.sql | sort)"
          if [[ "$changed_sql" != "$expected_sql" ]]; then
            printf 'DP-6 SQL diff mismatch.\nExpected:\n%s\nObserved:\n%s\n' "$expected_sql" "$changed_sql" >&2
            exit 1
          fi
      - name: Apply canonical state SQL through DP-6
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p verification/dp6/runtime
          log="verification/dp6/runtime/DP6_POSTGRESQL_${{ matrix.postgres }}.log"
          : > "$log"
          for script in database/journey-connect-db-v2.7/{01..46}_*.sql; do
            if [[ "$script" == *_smoke_test.sql || "$script" == *_validation.sql ]]; then
              echo "SKIP ROLLBACK-ONLY $script" | tee -a "$log"
              continue
            fi
            echo "APPLY $script" | tee -a "$log"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$script" 2>&1 | tee -a "$log"
          done
          for smoke in \
            database/journey-connect-db-v2.7/31_data_event_store_smoke_test.sql \
            database/journey-connect-db-v2.7/34_data_retry_quarantine_smoke_test.sql \
            database/journey-connect-db-v2.7/37_data_recommendation_adapter_shadow_validation.sql \
            database/journey-connect-db-v2.7/42_data_projection_snapshot_validation.sql \
            database/journey-connect-db-v2.7/47_data_quality_validation.sql; do
            echo "APPLY $smoke" | tee -a "$log"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$smoke" 2>&1 | tee -a "$log"
          done
      - name: Run protected and DP-6 concurrency regressions
        shell: bash
        run: |
          set -o pipefail
          chmod +x verification/dp2/run_dp2_concurrency.sh verification/dp3/run_dp3_concurrency.sh \
            verification/dp4-5/run_dp45_concurrency.sh verification/dp5/run_dp5_concurrency.sh \
            verification/dp6/run_dp6_concurrency.sh
          verification/dp2/run_dp2_concurrency.sh 2>&1 | tee verification/dp6/runtime/DP2_CONCURRENCY_PG${{ matrix.postgres }}.log
          verification/dp3/run_dp3_concurrency.sh 2>&1 | tee verification/dp6/runtime/DP3_CONCURRENCY_PG${{ matrix.postgres }}.log
          verification/dp4-5/run_dp45_concurrency.sh 2>&1 | tee verification/dp6/runtime/DP45_CONCURRENCY_PG${{ matrix.postgres }}.log
          verification/dp5/run_dp5_concurrency.sh 2>&1 | tee verification/dp6/runtime/DP5_CONCURRENCY_PG${{ matrix.postgres }}.log
          verification/dp6/run_dp6_concurrency.sh 2>&1 | tee verification/dp6/runtime/DP6_CONCURRENCY_PG${{ matrix.postgres }}.log
      - name: Upload DP-6 PostgreSQL evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dp6-postgresql-${{ matrix.postgres }}-evidence
          path: verification/dp6/runtime/**
          if-no-files-found: error
