name: Data PostgreSQL CI

on:
  pull_request:
    paths:
      - "database/journey-connect-db-v2.7/29_*.sql"
      - "database/journey-connect-db-v2.7/30_*.sql"
      - "database/journey-connect-db-v2.7/31_*.sql"
      - "database/journey-connect-db-v2.7/32_*.sql"
      - "database/journey-connect-db-v2.7/33_*.sql"
      - "database/journey-connect-db-v2.7/34_*.sql"
      - "verification/dp2/**"
      - "verification/dp3/**"
      - "docs/platform/data/DP-2-*.md"
      - "docs/platform/data/DP-3-*.md"
      - ".github/workflows/data-postgres-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: data-postgres-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  data-processing:
    name: PostgreSQL ${{ matrix.postgres }} / DP-2 and DP-3
    runs-on: ubuntu-latest
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        postgres: ["15", "18"]

    services:
      postgres:
        image: postgres:${{ matrix.postgres }}-alpine
        env:
          POSTGRES_DB: journey_connect
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d journey_connect"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/journey_connect
      PGPASSWORD: postgres

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install PostgreSQL client
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Run Data static contract verification
        shell: bash
        run: |
          python verification/dp2/run_dp2_static_verification.py
          python verification/dp3/run_dp3_static_verification.py

      - name: Verify protected SQL 01..31 unchanged
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          protected_changes="$(git diff --name-only origin/main...HEAD -- database/journey-connect-db-v2.7 \
            | grep -E '/(0[1-9]|1[0-9]|2[0-9]|3[01])_.*\.sql$' || true)"
          if [[ -n "$protected_changes" ]]; then
            printf 'Protected canonical SQL changed:\n%s\n' "$protected_changes" >&2
            exit 1
          fi

      - name: Apply canonical state SQL through DP-3
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p verification/dp3/runtime
          log="verification/dp3/runtime/DP3_POSTGRESQL_${{ matrix.postgres }}.log"
          : > "$log"

          for script in database/journey-connect-db-v2.7/{01..33}_*.sql; do
            if [[ "$script" == *_smoke_test.sql ]]; then
              echo "SKIP ROLLBACK-ONLY PROTECTED SMOKE $script" | tee -a "$log"
              continue
            fi
            echo "APPLY $script" | tee -a "$log"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$script" 2>&1 | tee -a "$log"
          done

          echo "APPLY database/journey-connect-db-v2.7/31_data_event_store_smoke_test.sql" | tee -a "$log"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -f database/journey-connect-db-v2.7/31_data_event_store_smoke_test.sql 2>&1 | tee -a "$log"
          echo "APPLY database/journey-connect-db-v2.7/34_data_retry_quarantine_smoke_test.sql" | tee -a "$log"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -f database/journey-connect-db-v2.7/34_data_retry_quarantine_smoke_test.sql 2>&1 | tee -a "$log"

      - name: Run DP-2 idempotency concurrency verification
        shell: bash
        run: |
          set -o pipefail
          chmod +x verification/dp2/run_dp2_concurrency.sh
          verification/dp2/run_dp2_concurrency.sh 2>&1 \
            | tee "verification/dp3/runtime/DP2_CONCURRENCY_PG${{ matrix.postgres }}.log"

      - name: Run DP-3 claim concurrency verification
        shell: bash
        run: |
          set -o pipefail
          chmod +x verification/dp3/run_dp3_concurrency.sh
          verification/dp3/run_dp3_concurrency.sh 2>&1 \
            | tee "verification/dp3/runtime/DP3_CONCURRENCY_PG${{ matrix.postgres }}.log"

      - name: Upload DP-3 PostgreSQL evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dp3-postgresql-${{ matrix.postgres }}-evidence
          path: verification/dp3/runtime/**
          if-no-files-found: error
