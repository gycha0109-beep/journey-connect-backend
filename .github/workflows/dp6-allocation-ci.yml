name: DP6 Allocation Gate

on:
  pull_request:
    branches:
      - main
    paths:
      - "docs/platform/governance/SC-DP6-QUALITY-ALLOCATION.md"
      - "docs/platform/governance/SC-DECISION-REGISTER.md"
      - "docs/platform/governance/SC-PLATFORM-REGISTRY.md"
      - "docs/platform/governance/SC-HANDOFF.md"
      - "docs/platform/data/DP-6-*.md"
      - "verification/dp6/**"
      - "verification/sc-dp1-baseline-reconciliation/run_sc_baseline_reconciliation.py"
      - ".github/workflows/dp6-allocation-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  allocation:
    name: DP-6 SC allocation / protected diff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Validate DP-6 allocation boundary
        shell: bash
        run: |
          set -o pipefail
          mkdir -p verification/dp6/runtime
          python verification/dp6/run_dp6_allocation_verification.py \
            2>&1 | tee verification/dp6/runtime/DP6_ALLOCATION_CI.log
      - name: Validate SC reconciliation
        shell: bash
        run: |
          set -o pipefail
          python verification/sc-dp1-baseline-reconciliation/run_sc_baseline_reconciliation.py \
            2>&1 | tee verification/dp6/runtime/DP6_SC_RECONCILIATION_CI.log
      - name: Upload DP-6 allocation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dp6-allocation-ci-evidence
          path: verification/dp6/runtime
          if-no-files-found: error
