name: DP-4 Verified Adapter Bootstrap

on:
  pull_request:
    paths:
      - ".dp4-payload/**"
      - ".github/workflows/dp4-discovery.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-verified-adapter:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Reassemble, verify and normalize payload
        shell: bash
        run: |
          set -euo pipefail
          cat .dp4-payload/part-* > /tmp/dp4-payload.b64
          base64 --decode /tmp/dp4-payload.b64 > /tmp/dp4-payload.tar.gz
          echo "4c71b097553d0613730f2c2c86ac41947788ed14f1394f647b4171984d936ad3  /tmp/dp4-payload.tar.gz" | sha256sum -c -
          tar -tzf /tmp/dp4-payload.tar.gz >/dev/null
          tar -xzf /tmp/dp4-payload.tar.gz -C .
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/platform/data/DP-4-P0-RECOMMENDATION-EVENT-ADAPTER.md')
          text = path.read_text(encoding='utf-8')
          marker = 'Recommendation P0 source → Data shadow candidate'
          if marker not in text:
              text = text.replace('# DP-4 P0 Recommendation Event Adapter\n', '# DP-4 P0 Recommendation Event Adapter\n\nAuthority direction: **Recommendation P0 source → Data shadow candidate**.\n', 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate adapter and protected contracts
        shell: bash
        run: |
          set +e
          mkdir -p verification/dp4/runtime
          chmod +x jc-backend/gradlew
          (cd jc-backend && ./gradlew :jc-data-contracts:check :jc-recommendation-core:check --stacktrace --no-daemon) \
            > verification/dp4/runtime/DP4_BOOTSTRAP_GRADLE.log 2>&1
          gradle_status=$?
          python verification/dp4/run_dp4_static_verification.py \
            > verification/dp4/runtime/DP4_BOOTSTRAP_STATIC.log 2>&1
          static_status=$?
          cat verification/dp4/runtime/DP4_BOOTSTRAP_GRADLE.log
          cat verification/dp4/runtime/DP4_BOOTSTRAP_STATIC.log
          if [[ $gradle_status -ne 0 || $static_status -ne 0 ]]; then
            exit 1
          fi

      - name: Upload bootstrap diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dp4-bootstrap-diagnostics
          path: verification/dp4/runtime/**
          if-no-files-found: warn

      - name: Publish verified implementation
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .dp4-payload verification/dp4/runtime
          git checkout -- .github/workflows/dp4-discovery.yml jc-backend/gradlew
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat(dp4): implement P0 recommendation event adapter"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
