name: Data Contract CI
on:
  pull_request:
    paths:
      - "jc-data-contracts/**"
      - "jc-backend/settings.gradle.kts"
      - "docs/platform/data/DP-[1-7]-*.md"
      - "docs/platform/data/DATA-PLATFORM-*.md"
      - "docs/platform/data/HANDOFF-DATA-TO-*.md"
      - "verification/dp1/**"
      - "verification/dp2/**"
      - "verification/dp3/**"
      - "verification/dp4/**"
      - "verification/dp4-5/**"
      - "verification/dp5/**"
      - "verification/dp6/**"
      - "verification/dp7/**"
      - "verification/data-platform-closure/**"
      - ".github/workflows/data-contract-ci.yml"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: data-contract-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  data-contracts:
    name: Java 21 / DP-1 through DP-7 contracts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: jc-backend
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
      - run: chmod +x ./gradlew
      - name: Run Data contract gate
        run: |
          ./gradlew :jc-data-contracts:check --stacktrace --no-daemon
          python ../verification/dp5/run_dp5_static_verification.py
          python ../verification/dp6/run_dp6_static_verification.py
          python ../verification/dp7/run_dp7_static_verification.py
          python ../verification/data-platform-closure/run_data_platform_closure_verification.py
      - name: Run Recommendation Java Core regression
        run: ./gradlew :jc-recommendation-core:check --stacktrace --no-daemon
