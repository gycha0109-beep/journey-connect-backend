name: Data Contract CI

on:
  pull_request:
    paths:
      - "jc-data-contracts/**"
      - "jc-backend/settings.gradle.kts"
      - "docs/platform/data/DP-1-*.md"
      - "docs/platform/data/DP-2-*.md"
      - "docs/platform/data/DP-3-*.md"
      - "docs/platform/data/DP-4-*.md"
      - "verification/dp1/**"
      - "verification/dp2/**"
      - "verification/dp3/**"
      - "verification/dp4/**"
      - "verification/dp4-5/**"
      - ".github/workflows/data-contract-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: data-contract-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  data-contracts:
    name: Java 21 / DP-1 through DP-4.5 contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: jc-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Run Data contract gate
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ../verification/dp4/runtime ../verification/dp4-5/runtime
          ./gradlew :jc-data-contracts:check --stacktrace --no-daemon 2>&1 \
            | tee ../verification/dp4/runtime/DP4_DATA_CONTRACT_CI.log
          python ../verification/dp4/run_dp4_static_verification.py 2>&1 \
            | tee ../verification/dp4/runtime/DP4_STATIC_CI.log
          python ../verification/dp4-5/run_dp45_static_verification.py 2>&1 \
            | tee ../verification/dp4-5/runtime/DP45_STATIC_CI.log

      - name: Run Recommendation Java Core regression
        shell: bash
        run: |
          set -o pipefail
          ./gradlew :jc-recommendation-core:check --stacktrace --no-daemon 2>&1 \
            | tee ../verification/dp4/runtime/DP4_RECOMMENDATION_CORE_CI.log

      - name: Upload Data contract evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dp45-data-contract-ci-evidence
          path: |
            verification/dp4/runtime/**
            verification/dp4-5/runtime/**
            jc-data-contracts/build/reports/**
            jc-data-contracts/build/test-results/**
            jc-recommendation-core/build/reports/**
            jc-recommendation-core/build/test-results/**
          if-no-files-found: warn
