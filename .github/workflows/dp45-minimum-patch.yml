name: DP-4.5 Minimum Privilege Patch

on:
  push:
    branches:
      - codex/dp-4-5-shadow-evidence-persistence
    paths:
      - ".github/workflows/dp45-minimum-patch.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: codex/dp-4-5-shadow-evidence-persistence
          fetch-depth: 0
      - name: Remove redundant row lock
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('database/journey-connect-db-v2.7/36_data_recommendation_adapter_shadow_persistence.sql')
          text = path.read_text(encoding='utf-8')
          needle = "  WHERE run.logical_identity_hash = v_logical_hash\n  FOR UPDATE;"
          replacement = "  WHERE run.logical_identity_hash = v_logical_hash;"
          if text.count(needle) != 1:
              raise SystemExit('expected exactly one redundant row lock')
          path.write_text(text.replace(needle, replacement), encoding='utf-8')
          Path('.github/workflows/dp45-minimum-patch.yml').unlink()
          PY
      - name: Commit correction
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(dp4.5): rely on advisory lock for logical identity"
          git push origin HEAD:codex/dp-4-5-shadow-evidence-persistence
