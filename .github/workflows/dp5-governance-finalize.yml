name: DP5 SC Reconciliation Correction

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  correct:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: codex/dp-5-projection-snapshot-foundation
          fetch-depth: 0
      - name: Correct SC protected regression gate
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('verification/sc-dp1-baseline-reconciliation/run_sc_baseline_reconciliation.py')
          text = path.read_text(encoding='utf-8')
          old = '    ".github/workflows/backend-pr-ci.yml",\n'
          new = old + '    ".github/workflows/dp5-governance-finalize.yml",\n'
          if old not in text:
              raise SystemExit('workflow allowlist marker missing')
          text = text.replace(old, new, 1)
          old = '    "Implementation authority: `GRANTED AFTER MERGE INTO MAIN`",\n'
          new = ('    "Implementation authority: `GRANTED`",\n'
                 '    "Authoritative allocation main: `67a9b7515dbfd41360160c8059ac387e74cbdf6b`",\n')
          if old not in text:
              raise SystemExit('allocation marker missing')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add verification/sc-dp1-baseline-reconciliation/run_sc_baseline_reconciliation.py
          git commit -m "fix(sc): reconcile merged DP-5 allocation gate"
          git push origin HEAD:codex/dp-5-projection-snapshot-foundation
