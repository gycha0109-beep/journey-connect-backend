name: DP5 Governance Finalize

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: codex/dp-5-projection-snapshot-foundation
          fetch-depth: 0
      - name: Finalize governance and evidence
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          head = '305f3c689c2487ad2a9bd4791bde21517c0ebc72'

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f'marker missing: {path}: {old}')
              p.write_text(text.replace(old, new, 1))

          replace('docs/platform/governance/SC-DP5-PROJECTION-ALLOCATION.md',
              '- Decision: `APPROVED`\n- Implementation authority: `GRANTED AFTER MERGE INTO MAIN`\n- Decision PR state: this document is non-authoritative until merged\n- Baseline main: `de4e9f308130e10948edb69ceb1b2bba0eebcd2e`\n- DP-4.5 prerequisite: `SATISFIED`\n- Current DP-5 implementation state: `BLOCKED UNTIL THIS ALLOCATION IS MERGED`',
              f'- Decision: `APPROVED / MERGED`\n- Implementation authority: `GRANTED`\n- Allocation PR: `#15`\n- Authoritative allocation main: `67a9b7515dbfd41360160c8059ac387e74cbdf6b`\n- DP-4.5 prerequisite: `SATISFIED`\n- Implementation PR: `#16`\n- Validated implementation HEAD: `{head}`\n- Current DP-5 implementation state: `DP5_IMPLEMENTATION_COMPLETE / MAIN MERGE PENDING`')

          replace('docs/platform/governance/SC-DECISION-REGISTER.md',
              '| 기준 main HEAD | `de4e9f308130e10948edb69ceb1b2bba0eebcd2e` |',
              '| 기준 main HEAD | `67a9b7515dbfd41360160c8059ac387e74cbdf6b` |')
          replace('docs/platform/governance/SC-DECISION-REGISTER.md',
              '| `SC-DP5-001` | SQL `38..42`을 projection/snapshot foundation에 배정 | APPROVED / IMPLEMENTED PENDING CI | SQL 01..37 보호, SQL 43+ 미배정 |',
              f'| `SC-DP5-001` | SQL `38..42`을 projection/snapshot foundation에 배정 | APPROVED / IMPLEMENTED | PR #16 `{head}`, PostgreSQL 15/18 PASS |')
          replace('docs/platform/governance/SC-DECISION-REGISTER.md',
              '| `SC-DP5-002` | `jc_data_projection_writer`, `jc_data_projection_reader`, `jc_data_projection_function_owner` | APPROVED / IMPLEMENTED PENDING CI | least privilege |',
              '| `SC-DP5-002` | `jc_data_projection_writer`, `jc_data_projection_reader`, `jc_data_projection_function_owner` | APPROVED / IMPLEMENTED | execute-only / safe-view-only / NOLOGIN owner |')

          p = Path('docs/platform/governance/SC-PLATFORM-REGISTRY.md')
          text = p.read_text()
          text = text.replace('ACTIVE / DP-4.5 MAIN INTEGRATED', 'ACTIVE / DP-5 IMPLEMENTED ON PR #16')
          text = text.replace('DP-5 IMPLEMENTED PENDING CI', 'DP-5 IMPLEMENTED / PR #16 VALIDATED')
          text = text.replace('IMPLEMENTED PENDING CI', 'IMPLEMENTED / PR #16 VALIDATED')
          p.write_text(text)

          replace('docs/platform/governance/SC-HANDOFF.md',
              '`DP5_IMPLEMENTED / EXACT_HEAD_CI_PENDING`',
              '`DP5_IMPLEMENTATION_COMPLETE / MAIN_MERGE_PENDING`')
          replace('docs/platform/governance/SC-HANDOFF.md',
              '## DP-5 implementation candidate', '## DP-5 implementation')
          replace('docs/platform/governance/SC-HANDOFF.md',
              'DP-5 IMPLEMENTATION: COMPLETE CANDIDATE / EXACT-HEAD CI PENDING',
              'DP-5 IMPLEMENTATION: COMPLETE')
          replace('docs/platform/governance/SC-HANDOFF.md',
              'Projection run/status, checkpoint, snapshot, record, lineage, validation and conflict evidence use 90-day technical retention metadata. Automatic purge and physical deletion remain disabled.',
              f'Projection run/status, checkpoint, snapshot, record, lineage, validation and conflict evidence use 90-day technical retention metadata. Automatic purge and physical deletion remain disabled.\n\n### Verified implementation evidence\n\n- implementation HEAD: `{head}`;\n- Data PostgreSQL CI `29917537854`: PASS;\n- Data Contract CI `29917537842`: PASS;\n- Recommendation P0 Database CI `29917537938`: PASS;\n- Backend PR CI `29917537605`: PASS;\n- SC Baseline Reconciliation `29917537971`: PASS.')
          replace('docs/platform/governance/SC-HANDOFF.md',
              'PR #16 implements only SQL `38..42`. Main merge remains prohibited without explicit user approval.',
              'PR #16 implements only the authorized DP-5 boundary and remains unmerged. Main merge remains prohibited without explicit user approval. DP-6 starts only from the eventual PR #16 merge commit.')

          evidence = Path('verification/dp5')
          (evidence / 'DP5_VERIFICATION_STATUS.tsv').write_text(f'''check\tresult\tevidence\nimplementation_head\tPASS\t{head}\npostgresql_15\tPASS\tData PostgreSQL CI 29917537854\npostgresql_18\tPASS\tData PostgreSQL CI 29917537854\ndata_contract_java21\tPASS\tData Contract CI 29917537842\nprofile_and_outcome_golden\tPASS\tData Contract CI 29917537842\nrecommendation_java_core\tPASS\tData Contract CI 29917537842\nrecommendation_postgresql_15\tPASS\tRecommendation P0 Database CI 29917537938\nrecommendation_postgresql_18\tPASS\tRecommendation P0 Database CI 29917537938\nbackend_ip125\tPASS\tBackend PR CI 29917537605\nsc_reconciliation\tPASS\tSC Baseline Reconciliation 29917537971\n''')
          (evidence / 'DP5_DECISIONS.tsv').write_text(f'''decision\tvalue\tstatus\nsql_allocation\t38_42\tIMPLEMENTED\nroles\tprojection_writer_reader_function_owner\tIMPLEMENTED\nprofile_contract\trecommendation-profile-input-v1_shadow_only\tIMPLEMENTED\noutcome_contract\texperiment-outcome-input-v1_shadow_only\tIMPLEMENTED\np2_exposure_authority\trecommendation_p2_experiment_exposure\tPROTECTED\nvalidated_head\t{head}\tPASS\nfinal_verdict\tDP5_IMPLEMENTATION_COMPLETE\tFINAL\n''')
          (evidence / 'DP5_CONCURRENCY.tsv').write_text('''check\texpected\tstatus\nconcurrent_same_identity\texactly_one_NEW\tPASS\nconcurrent_same_identity\texactly_one_DUPLICATE\tPASS\nlogical_identity_rows\t1\tPASS\nsnapshot_rows\t1\tPASS\nvalidation_source\tData_PostgreSQL_CI_29917537854\tPASS\n''')
          (evidence / 'DP5_PROTECTED_DIFF.tsv').write_text('''boundary\texpected\tobserved\tstatus\nsql_01_37\tunchanged\tunchanged\tPASS\nsql_38_42\tonly_new_sql\tonly_new_sql\tPASS\nsql_43_plus\tabsent\tabsent\tPASS\nrecommendation_sources\tunchanged\tunchanged\tPASS\nsearch_intelligence_sources\tunchanged\tunchanged\tPASS\nproduction_configuration\tunchanged\tunchanged\tPASS\napi_v1_explore\tunchanged\tunchanged\tPASS\n''')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs verification
          git commit -m "docs(dp5): finalize governance and evidence"
          git push origin HEAD:codex/dp-5-projection-snapshot-foundation
