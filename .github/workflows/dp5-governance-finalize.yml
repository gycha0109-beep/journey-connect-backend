name: DP5 Timestamp Fixture Correction

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  correct:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: codex/dp-5-projection-snapshot-foundation
          fetch-depth: 0
      - name: Correct timestamp tamper fixture
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('database/journey-connect-db-v2.7/42_data_projection_snapshot_validation.sql')
          text = path.read_text(encoding='utf-8')
          old = '"2026-07-21T00:00:02Z"'
          new = '"2026-07-20T23:59:59Z"'
          if old not in text:
              raise SystemExit('timestamp fixture marker missing')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add database/journey-connect-db-v2.7/42_data_projection_snapshot_validation.sql
          git commit -m "test(dp5): use valid-order timestamp tamper fixture"
          git push origin HEAD:codex/dp-5-projection-snapshot-foundation
