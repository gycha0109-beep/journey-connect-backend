name: DP5 Implementation Bootstrap

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v7
        with:
          ref: codex/dp-5-projection-snapshot-foundation
          fetch-depth: 0

      - name: Reconstruct uploaded implementation archive
        shell: bash
        run: |
          set -euo pipefail
          cat .dp5-bootstrap/chunk-*.b64 > dp5-uploaded.b64
          base64 --decode dp5-uploaded.b64 > dp5-uploaded.tgz
          sha256sum .dp5-bootstrap/chunk-*.b64 dp5-uploaded.b64 dp5-uploaded.tgz | tee dp5-uploaded.sha256
          wc -c .dp5-bootstrap/chunk-*.b64 dp5-uploaded.b64 dp5-uploaded.tgz | tee dp5-uploaded.sizes

      - name: Upload reconstructed archive
        uses: actions/upload-artifact@v4
        with:
          name: dp5-uploaded-archive-${{ github.sha }}
          path: |
            dp5-uploaded.b64
            dp5-uploaded.tgz
            dp5-uploaded.sha256
            dp5-uploaded.sizes
          if-no-files-found: error
