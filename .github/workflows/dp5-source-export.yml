name: DP5 Implementation Bootstrap

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: dp5-implementation-bootstrap
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v7
        with:
          ref: codex/dp-5-projection-snapshot-foundation
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Restore, validate and commit implementation
        shell: bash
        run: |
          set -euo pipefail
          cat .dp5-bootstrap/chunk-*.b64 > /tmp/dp5-changes.b64
          python - <<'PY'
          from pathlib import Path
          path = Path('/tmp/dp5-changes.b64')
          data = bytearray(path.read_bytes())
          assert data[21298:21299] == b'o'
          assert data[30715:30717] == b'ru'
          data[21298:21299] = b'e'
          data[30715:30717] = b'ur'
          path.write_bytes(data)
          PY
          base64 --decode /tmp/dp5-changes.b64 > /tmp/dp5-changes.tgz
          test "$(sha256sum /tmp/dp5-changes.tgz | awk '{print $1}')" = "e4f251a3028352802dc0b653736cf947cc29f956f8142e91cd112c3f17f0c8e6"
          tar -xzf /tmp/dp5-changes.tgz -C .
          rm -rf .dp5-bootstrap verification/dp5/__pycache__
          chmod +x verification/dp5/run_dp5_concurrency.sh
          cd jc-backend
          chmod +x ./gradlew
          ./gradlew :jc-data-contracts:dp5ProjectionContractTest --stacktrace --no-daemon
          cd ..
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git reset -- .github/workflows
          git diff --cached --quiet && { echo 'No implementation changes staged.' >&2; exit 1; }
          git commit -m "feat(dp5): implement projection and snapshot foundation"
          git push origin HEAD:codex/dp-5-projection-snapshot-foundation
