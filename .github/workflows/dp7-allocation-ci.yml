name: DP7 Final Materialization

on:
  pull_request:
    branches: [main]
    paths:
      - "verification/dp7/.materialize/**"
      - ".github/workflows/dp7-allocation-ci.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dp7-final-materialization-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Materialize complete DP-7 implementation
        run: python verification/dp7/.materialize/materialize_dp7_v5.py
      - name: Commit implementation without workflow mutations
        shell: bash
        run: |
          set -euo pipefail
          rm -rf verification/dp7/.materialize
          git restore --source=HEAD -- .github/workflows
          test -f database/journey-connect-db-v2.7/52_cross_track_integration_validation.sql
          test -f jc-data-contracts/src/main/java/com/jc/data/contract/v1/integration/FullCrossTrackIntegrationValidator.java
          test -f verification/dp7/run_dp7_static_verification.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git status --short
          git commit -m "feat(dp7): implement cross-track integration validation"
          git push origin HEAD:${{ github.head_ref }}
