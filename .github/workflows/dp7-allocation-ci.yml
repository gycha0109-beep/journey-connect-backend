name: DP7 Allocation Gate
on:
  pull_request:
    branches: [main]
    paths:
      - "database/journey-connect-db-v2.7/4[8-9]_*.sql"
      - "database/journey-connect-db-v2.7/5[0-2]_*.sql"
      - "jc-data-contracts/**"
      - "docs/platform/governance/**"
      - "docs/platform/data/DP-7-*.md"
      - "docs/platform/data/DATA-PLATFORM-*.md"
      - "docs/platform/data/HANDOFF-DATA-TO-*.md"
      - "verification/dp7/**"
      - "verification/data-platform-closure/**"
      - "verification/sc-dp1-baseline-reconciliation/**"
      - ".github/workflows/dp7-allocation-ci.yml"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: dp7-allocation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  implementation-boundary:
    name: DP-7 implementation / closure protected diff
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python verification/dp7/run_dp7_allocation_verification.py
      - run: python verification/dp7/run_dp7_static_verification.py
      - run: python verification/data-platform-closure/run_data_platform_closure_verification.py
      - run: python verification/sc-dp1-baseline-reconciliation/run_sc_baseline_reconciliation.py
  contract-regression:
    name: Java 21 / Data and target-track contracts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: jc-backend
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
      - run: chmod +x ./gradlew
      - name: Run Data and target-track regressions
        run: |
          ./gradlew :jc-data-contracts:check :jc-recommendation-core:check :jc-intelligence-contracts:check :jc-search-contracts:check :jc-search-compatibility:check --stacktrace --no-daemon
      - name: Run backend production protection
        run: ./gradlew :test --tests com.jc.backend.search.shadow.production.IP12ProductionShadowStaticTest --stacktrace --no-daemon
