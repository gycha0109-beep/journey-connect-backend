name: DP7 Static Diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/dp7-static-diagnostic.yml"
      - "verification/dp5/run_dp5_static_verification.py"
      - "verification/dp6/run_dp6_allocation_verification.py"
      - "verification/dp6/run_dp6_static_verification.py"
      - "verification/dp7/run_dp7_allocation_verification.py"
      - "verification/dp7/run_dp7_static_verification.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run static verifiers independently
        shell: bash
        run: |
          set +e
          mkdir -p verification/dp7/runtime
          status=0
          run_check() {
            name="$1"
            shift
            "$@" 2>&1 | tee "verification/dp7/runtime/${name}.log"
            rc=${PIPESTATUS[0]}
            if [[ $rc -ne 0 ]]; then status=$rc; fi
          }
          run_check DP5_STATIC python verification/dp5/run_dp5_static_verification.py
          run_check DP6_ALLOCATION python verification/dp6/run_dp6_allocation_verification.py
          run_check DP6_STATIC python verification/dp6/run_dp6_static_verification.py
          run_check DP7_ALLOCATION python verification/dp7/run_dp7_allocation_verification.py
          run_check DP7_STATIC python verification/dp7/run_dp7_static_verification.py
          exit "$status"
      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dp7-static-diagnostic
          path: verification/dp7/runtime/*.log
          if-no-files-found: error
