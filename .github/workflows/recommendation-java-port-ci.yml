name: Recommendation Java Core CI

on:
  pull_request:
    paths:
      - "jc-recommendation-core/**"
      - "jc-backend/settings.gradle.kts"
      - "jc-backend/build.gradle.kts"
      - ".github/workflows/recommendation-java-port-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: recommendation-java-core-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  java-core-1-0:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for Gradle Wrapper
        working-directory: jc-backend
        run: chmod +x ./gradlew

      - name: Verify pure Java core, contracts, and committed golden fixtures
        working-directory: jc-backend
        run: ./gradlew :jc-recommendation-core:check --stacktrace --no-daemon
