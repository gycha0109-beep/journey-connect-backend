name: DP6 Apply Diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/dp6-workspace-export.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: codex/dp-6-data-quality-validation
      BLOB_0: cac4b7271b1ad4d4b334adf015e5d98772a2c66d
      BLOB_1: 80e52cee91f87da3b18f56671ebbe3be5b7fcc3e
      BLOB_2: 478e59433e232348c8d1f7ac484c77b908f54529
      BLOB_3: d4863d5c1c4fe1d08641fb404474f4fc248171a3
      BLOB_4: 38001bfcd99c3ce1bcce1ae638a0396a10a42f5a
      BLOB_5: 2c0f2ce27e8df4fb97d457609e5ed2683afe617d
      BLOB_6: 8d64d3e12dcd093e3090d13714030b384a555e25
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: codex/dp-6-data-quality-validation
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Record payload diagnostics
        shell: bash
        run: |
          set -u
          mkdir -p verification/dp6
          diag=verification/dp6/DP6_APPLY_DIAGNOSTIC.txt
          : > /tmp/dp6-payload.b64
          : > "$diag"
          for variable in BLOB_0 BLOB_1 BLOB_2 BLOB_3 BLOB_4 BLOB_5 BLOB_6; do
            sha="${!variable}"
            curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/git/blobs/${sha}" \
              | jq -r '.content' | tr -d '\n' | base64 -d >> /tmp/dp6-payload.b64
            printf '%s\t%s\n' "$variable" "$(wc -c < /tmp/dp6-payload.b64)" >> "$diag"
          done
          printf 'b64_size\t%s\n' "$(wc -c < /tmp/dp6-payload.b64)" >> "$diag"
          printf 'b64_sha256\t%s\n' "$(sha256sum /tmp/dp6-payload.b64 | cut -d' ' -f1)" >> "$diag"
          if base64 -d /tmp/dp6-payload.b64 > /tmp/dp6-payload.tar.gz 2>> "$diag"; then
            printf 'decode\tPASS\n' >> "$diag"
            printf 'tar_sha256\t%s\n' "$(sha256sum /tmp/dp6-payload.tar.gz | cut -d' ' -f1)" >> "$diag"
            if gzip -t /tmp/dp6-payload.tar.gz 2>> "$diag"; then printf 'gzip\tPASS\n' >> "$diag"; else printf 'gzip\tFAIL\n' >> "$diag"; fi
          else
            printf 'decode\tFAIL\n' >> "$diag"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$diag"
          git commit -m "chore(dp6): record apply diagnostic"
          git push origin "HEAD:${TARGET_BRANCH}"
