name: DP6 Workspace Export

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/dp6-workspace-export.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Export workspace
        run: |
          tar --exclude='.git' -czf dp6-workspace.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: dp6-workspace-${{ github.event.pull_request.head.sha || github.sha }}
          path: dp6-workspace.tar.gz
          if-no-files-found: error
