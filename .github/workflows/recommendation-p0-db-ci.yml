name: Recommendation P0 Database CI
on:
  pull_request:
    paths:
      - "database/journey-connect-db-v1.9/**"
      - "database/journey-connect-db-v2.0/**"
      - "database/journey-connect-db-v2.1/**"
      - "database/journey-connect-db-v2.7/**"
      - "jc-backend/src/main/**"
      - "jc-backend/src/test/**"
      - "jc-backend/build.gradle.kts"
      - "jc-data-contracts/**"
      - "docs/platform/data/DP-4-*.md"
      - "docs/platform/data/DP-5-*.md"
      - "docs/platform/data/DATA-PLATFORM-*.md"
      - "docs/platform/data/HANDOFF-DATA-TO-*.md"
      - "verification/dp4/**"
      - "verification/dp5/**"
      - "verification/data-platform-closure/**"
      - ".github/workflows/recommendation-p0-db-ci.yml"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: recommendation-p0-db-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  canonical-database:
    name: Java/Testcontainers PostgreSQL ${{ matrix.postgres }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        postgres: ["15", "18"]
    defaults:
      run:
        working-directory: jc-backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
      - run: chmod +x ./gradlew
      - name: Run source and SQL integrity gates
        run: |
          ./gradlew p0Verification --stacktrace --no-daemon
          python ../verification/dp5/run_dp5_static_verification.py
          python ../verification/data-platform-closure/run_data_platform_closure_verification.py
      - name: Run canonical PostgreSQL suite
        env:
          JC_TEST_POSTGRES_IMAGE: postgres:${{ matrix.postgres }}-alpine
        run: ./gradlew test --stacktrace --no-daemon
